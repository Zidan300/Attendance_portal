<!DOCTYPE html>
<html>
<head>
    <title>Frontend Test - School Attendance Portal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #fff5e6 0%, #ffe6cc 100%);
        }
        .test-box {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(255, 102, 0, 0.15);
            margin-bottom: 20px;
        }
        h1 {
            color: #ff6600;
            text-align: center;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button {
            background: linear-gradient(135deg, #ff6600 0%, #ff8533 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 102, 0, 0.4);
        }
        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
        }
        .code { font-family: monospace; background: #f0f0f0; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🎓 Frontend Authentication Test</h1>
    
    <div class="test-box">
        <h2>📋 Test Checklist</h2>
        <div id="results"></div>
    </div>

    <div class="test-box">
        <h2>🧪 Manual Test</h2>
        <button onclick="testLogin()">Test Login API</button>
        <button onclick="testVerify()">Test Verify API</button>
        <button onclick="testProtected()">Test Protected Route</button>
        <button onclick="window.open('http://localhost:3000', '_blank')">Open Portal</button>
        <div id="apiResults"></div>
    </div>

    <div class="test-box">
        <h2>🔐 Credentials</h2>
        <div class="info">
            <strong>Username:</strong> <span class="code">zidan</span><br>
            <strong>Password:</strong> <span class="code">zidan123</span>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';
        let token = '';

        const tests = [
            { name: 'Server is running', check: 'server' },
            { name: 'Login endpoint works', check: 'login' },
            { name: 'Invalid credentials rejected', check: 'invalid' },
            { name: 'Token verification works', check: 'verify' },
            { name: 'Protected routes blocked without token', check: 'blocked' },
            { name: 'Protected routes accessible with token', check: 'protected' }
        ];

        async function runTests() {
            const results = document.getElementById('results');
            results.innerHTML = '<p>Running tests...</p>';
            
            let html = '';
            for (const test of tests) {
                const result = await runTest(test.check);
                const className = result.passed ? 'success' : 'error';
                const icon = result.passed ? '✓' : '✗';
                html += `<div class="status ${className}">${icon} ${test.name}</div>`;
            }
            results.innerHTML = html;
        }

        async function runTest(type) {
            try {
                switch(type) {
                    case 'server':
                        await fetch('http://localhost:3000');
                        return { passed: true };
                    
                    case 'login':
                        const loginRes = await fetch(`${API}/auth/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: 'zidan', password: 'zidan123' })
                        });
                        const loginData = await loginRes.json();
                        token = loginData.token;
                        return { passed: !!loginData.token };
                    
                    case 'invalid':
                        const invalidRes = await fetch(`${API}/auth/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: 'zidan', password: 'wrong' })
                        });
                        const invalidData = await invalidRes.json();
                        return { passed: invalidData.message === 'Invalid credentials' };
                    
                    case 'verify':
                        const verifyRes = await fetch(`${API}/auth/verify`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        const verifyData = await verifyRes.json();
                        return { passed: verifyData.valid === true };
                    
                    case 'blocked':
                        const blockedRes = await fetch(`${API}/sections`);
                        const blockedData = await blockedRes.json();
                        return { passed: blockedData.message === 'Access Denied' };
                    
                    case 'protected':
                        const protectedRes = await fetch(`${API}/sections`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        const protectedData = await protectedRes.json();
                        return { passed: Array.isArray(protectedData) };
                }
            } catch(e) {
                return { passed: false, error: e.message };
            }
        }

        async function testLogin() {
            const results = document.getElementById('apiResults');
            results.innerHTML = '<p>Testing login...</p>';
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'zidan', password: 'zidan123' })
                });
                const data = await res.json();
                token = data.token;
                results.innerHTML = `<div class="success">✓ Login successful!</div><pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch(e) {
                results.innerHTML = `<div class="error">✗ Error: ${e.message}</div>`;
            }
        }

        async function testVerify() {
            const results = document.getElementById('apiResults');
            if (!token) {
                results.innerHTML = '<div class="error">Please test login first!</div>';
                return;
            }
            results.innerHTML = '<p>Testing verification...</p>';
            try {
                const res = await fetch(`${API}/auth/verify`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                results.innerHTML = `<div class="success">✓ Token verified!</div><pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch(e) {
                results.innerHTML = `<div class="error">✗ Error: ${e.message}</div>`;
            }
        }

        async function testProtected() {
            const results = document.getElementById('apiResults');
            results.innerHTML = '<p>Testing protected route...</p>';
            try {
                const res = await fetch(`${API}/sections`, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                const data = await res.json();
                if (res.ok) {
                    results.innerHTML = `<div class="success">✓ Protected route accessible!</div><pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    results.innerHTML = `<div class="error">✗ Access denied (expected if no token)</div><pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch(e) {
                results.innerHTML = `<div class="error">✗ Error: ${e.message}</div>`;
            }
        }

        // Auto-run tests on load
        runTests();
    </script>
</body>
</html>
